name: Build robot-agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: robot-agent.exe
          - os: macos-latest
            artifact: robot-agent
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install bleak websockets pyinstaller

      - name: Compilar
        run: python build/build.py

      - name: Crear lanzador Mac (.command)
        if: matrix.os == 'macos-latest'
        run: |
          cat > dist/robot-agent.command << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          AGENT="$DIR/robot-agent"
          if [ ! -f "$AGENT" ]; then
            echo "Error: robot-agent no encontrado en $DIR"
            echo "Descargalo y ponelo en la misma carpeta que este archivo."
            read -p "Presioná Enter para salir..."
            exit 1
          fi
          chmod +x "$AGENT"
          "$AGENT"
          read -p "Presioná Enter para cerrar..."
          EOF
          chmod +x dist/robot-agent.command

      - name: Subir a Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}*
